<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>목표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
.ring-progress {
  transform-origin: center;
  transform: rotate(-90deg);
  transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1);
  stroke-dasharray: 440;
  stroke-dashoffset: 440;
}
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-3);
  font-size: 14px;
}
</style>
</head>
<body>

<div class="seg-wrap">
  <div class="seg-tab active" id="tab-daily" onclick="switchTab('daily')">일간</div>
  <div class="seg-tab" id="tab-monthly" onclick="switchTab('monthly')">월간</div>
</div>

<!-- Daily -->

      </svg>

</div>

<!-- Monthly -->

  <div class="page-header">
    <div class="page-title">목표 달성률</div>
    <div class="streak-chip" id="monthly-streak">🔥 잘 하고 있어요!</div>

  <div class="page-sub" id="monthly-date"></div>
  <div class="ring-wrap">
    <div class="ring-container">
      <svg class="ring-svg" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="70" fill="none" stroke="#2C2C2E" stroke-width="12"/>
        <circle id="monthly-ring" class="ring-progress" cx="80" cy="80" r="70"
          fill="none" stroke="white" stroke-width="12" stroke-linecap="round"/>
      </svg>
      <div class="ring-center">
        <div class="ring-pct" id="monthly-pct">0<span>%</span></div>
        <div class="ring-done">완료 <b id="monthly-done">0</b>/<span id="monthly-total">0</span></div>
      </div>
    </div>
  </div>
  <div class="sec-header">
    <span class="sec-title">To-Do-List</span>
    <span class="sec-action" onclick="openSheet('monthly')">+ 추가</span>

    <span class="tab-label">기록</span>

<button class="fab" id="fab-btn"><div class="fab-icon"></div></button>

<!-- Sheet: 일간 추가 -->
<div class="sheet-overlay" id="sheet-daily">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">일간 목표 추가하기</div>
    <div class="form-label">목표 설정</div>
    <div class="input-wrap">
      <input class="form-input" id="daily-input" type="text" placeholder="목표를 입력해 주세요." oninput="checkSave('daily')">

    </div>
    <div class="form-label">루틴 설정</div>
    <div class="chip-row" id="daily-chips">
      <button class="chip" onclick="selectDailyChip(this,'없음')">없음</button>
      <button class="chip" onclick="selectDailyChip(this,'매일')">매일</button>
      <button class="chip chip-sm" onclick="selectDailyChip(this,'월')">월</button>
      <button class="chip chip-sm" onclick="selectDailyChip(this,'화')">화</button>
      <button class="chip chip-sm" onclick="selectDailyChip(this,'수')">수</button>
      <button class="chip chip-sm" onclick="selectDailyChip(this,'목')">목</button>
      <button class="chip chip-sm" onclick="selectDailyChip(this,'금')">금</button>
      <button class="chip chip-sm" onclick="selectDailyChip(this,'토')">토</button>
      <button class="chip chip-sm" onclick="selectDailyChip(this,'일')">일</button>
    </div>
    <div class="sheet-btns">
      <button class="btn btn-cancel" onclick="closeSheet('daily')">취소</button>

    </div>
  </div>
</div>

<!-- Sheet: 월간 추가 -->
<div class="sheet-overlay" id="sheet-monthly">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">월간 목표 추가하기</div>
    <div class="form-label">목표 설정</div>
    <div class="input-wrap">
      <input class="form-input" id="monthly-input" type="text" placeholder="목표를 입력해 주세요." oninput="checkSave('monthly')">
      <div class="input-clear" id="monthly-clear" onclick="clearInput('monthly')"></div>
    </div>
    <div class="form-label">루틴 설정</div>
    <div class="chip-row" id="monthly-chips">
      <button class="chip" onclick="selectMonthlyChip(this)">없음</button>
      <button class="chip" onclick="selectMonthlyChip(this)">매월</button>
      <button class="chip" onclick="selectMonthlyChip(this)">1월</button>
      <button class="chip" onclick="selectMonthlyChip(this)">2월</button>
      <button class="chip" onclick="selectMonthlyChip(this)">3월</button>
      <button class="chip" onclick="selectMonthlyChip(this)">4월</button>

      <button class="chip" onclick="selectMonthlyChip(this)">7월</button>
      <button class="chip" onclick="selectMonthlyChip(this)">8월</button>
      <button class="chip" onclick="selectMonthlyChip(this)">9월</button>
      <button class="chip" onclick="selectMonthlyChip(this)">10월</button>
      <button class="chip" onclick="selectMonthlyChip(this)">11월</button>

<!-- Sheet: 수정 -->
<div class="sheet-overlay" id="sheet-edit">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="edit-title">목표 수정하기</div>
    <div class="form-label">목표 설정</div>
    <div class="input-wrap">
      <input class="form-input" id="edit-input" type="text">
      <div class="input-clear show" onclick="document.getElementById('edit-input').value=''"></div>
    </div>
    <div class="form-label">루틴 설정</div>
    <div class="chip-row" id="edit-chips"></div>
    <div class="sheet-btns">
      <button class="btn btn-cancel" onclick="closeSheet('edit')">취소</button>
      <button class="btn btn-save" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<script>
// ── 날짜 헬퍼 ──────────────────────────────────────────
const DAYS = ['일','월','화','수','목','금','토'];
const today = new Date();
const todayKey = `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
const todayDow = DAYS[today.getDay()]; // 월,화,수...

function formatDateKo(d) {
  return `${d.getMonth()+1}월 ${d.getDate()}일, ${['일','월','화','수','목','금','토'][d.getDay()]}요일`;
}
function formatMonthKo(d) {
  return `${d.getMonth()+1}월, ${d.getFullYear()}년`;
}

// ── localStorage 헬퍼 ──────────────────────────────────
function load(key) { return JSON.parse(localStorage.getItem(key) || '[]'); }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

// ── 오늘 체크 상태 저장 키 ──────────────────────────────
const CHECK_KEY_DAILY   = `checks-daily-${todayKey}`;
const CHECK_KEY_MONTHLY = `checks-monthly-${today.getFullYear()}-${today.getMonth()+1}`;

// ── 탭 전환 ──────────────────────────────────────────
let currentTab = 'daily';
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-daily').classList.toggle('active', tab==='daily');
  document.getElementById('tab-monthly').classList.toggle('active', tab==='monthly');
  document.getElementById('content-daily').style.display = tab==='daily' ? 'block' : 'none';
  document.getElementById('content-monthly').style.display = tab==='monthly' ? 'block' : 'none';
}

// ── 렌더링 ──────────────────────────────────────────
function getVisibleItems(type) {
  const allItems = load(type + '-items'); // [{id, text, routine, createdAt}]
  if (type === 'daily') {
    // 오늘 보여야 할 항목: routine이 없음이면 생성일이 오늘인 것만, 나머지는 루틴 조건
    return allItems.filter(item => {
      if (item.routine === '없음') return item.createdDate === todayKey;
      if (item.routine === '매일') return true;
      // 특정 요일
      const dowMap = {'월':1,'화':2,'수':3,'목':4,'금':5,'토':6,'일':0};
      if (dowMap[item.routine] !== undefined) return today.getDay() === dowMap[item.routine];
      // 복수 요일 (배열)
      if (Array.isArray(item.routine)) {
        return item.routine.some(r => dowMap[r] !== undefined && today.getDay() === dowMap[r]);
      }
      return false;
    });
  } else {
    // 월간: routine이 없음이면 생성월이 이번달, 매월이면 항상, 특정달이면 해당월
    const thisMonth = today.getMonth() + 1;
    const thisYear = today.getFullYear();
    return allItems.filter(item => {
      if (item.routine === '없음') {
        const [y, m] = (item.createdDate || '').split('-');
        return parseInt(y) === thisYear && parseInt(m) === thisMonth;
      }
      if (item.routine === '매월') return true;
      const monthNum = parseInt(item.routine);
      return monthNum === thisMonth;
    });
  }
}

function renderList(type) {
  const items = getVisibleItems(type);
  const checks = load(type === 'daily' ? CHECK_KEY_DAILY : CHECK_KEY_MONTHLY);
  const listEl = document.getElementById(type + '-list');

  if (items.length === 0) {
    listEl.innerHTML = `<div class="empty-state">목표를 추가해보세요 ✍️</div>`;
  } else {
    listEl.innerHTML = items.map(item => {
      const done = checks.includes(item.id);
      return `
      <div class="todo-item" data-id="${item.id}" data-type="${type}">
        <div class="checkbox ${done ? 'checked' : ''}" onclick="toggleCheck(this)"></div>
        <span class="todo-text ${done ? 'done' : ''}">${item.text}</span>
        <div class="more-btn" onclick="toggleCtx(this)">
          <div class="more-dots"><span></span><span></span><span></span></div>
          <div class="ctx-menu">
            <div class="ctx-item" onclick="openEditSheet(this)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>수정
            </div>
            <div class="ctx-item delete" onclick="deleteItem(this)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>삭제
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }
  updateRing(type);
}

function updateRing(type) {
  const items = getVisibleItems(type);
  const checkKey = type === 'daily' ? CHECK_KEY_DAILY : CHECK_KEY_MONTHLY;
  const checks = load(checkKey);
  const total = items.length;
  const done = items.filter(i => checks.includes(i.id)).length;
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  const circumference = 440;
  const offset = circumference - (pct / 100 * circumference);

  document.getElementById(type + '-pct').innerHTML = `${pct}<span>%</span>`;
  document.getElementById(type + '-done').textContent = done;
  document.getElementById(type + '-total').textContent = total;
  document.getElementById(type + '-ring').style.strokeDashoffset = offset;

  // streak chip
  const chip = document.getElementById(type + '-streak');
  chip.style.display = total === 0 ? 'none' : 'flex';
  if (pct === 100) chip.textContent = '🎉 모두 완료!';
  else if (pct >= 50) chip.textContent = '🔥 잘 하고 있어요!';
  else chip.textContent = '💪 조금만 더!';
}

// ── 체크 토글 ──────────────────────────────────────────
function toggleCheck(el) {
  const item = el.closest('.todo-item');
  const id = item.dataset.id;
  const type = item.dataset.type;
  const checkKey = type === 'daily' ? CHECK_KEY_DAILY : CHECK_KEY_MONTHLY;
  const checks = load(checkKey);
  const idx = checks.indexOf(id);
  if (idx === -1) checks.push(id);
  else checks.splice(idx, 1);
  save(checkKey, checks);
  renderList(type);

  // 기록 저장
  saveRecord(type, todayKey);
}

// ── 기록 저장 ──────────────────────────────────────────
function saveRecord(type, dateKey) {
  const items = getVisibleItems(type);
  const checkKey = type === 'daily' ? CHECK_KEY_DAILY : CHECK_KEY_MONTHLY;
  const checks = load(checkKey);
  const total = items.length;
  const done = items.filter(i => checks.includes(i.id)).length;
  const pct = total === 0 ? 0 : Math.round(done / total * 100);

  const records = load(type + '-records');
  const existing = records.findIndex(r => r.date === dateKey);
  const snapshot = items.map(i => ({ id: i.id, text: i.text, done: checks.includes(i.id) }));
  if (existing !== -1) records[existing] = { date: dateKey, pct, items: snapshot };
  else records.unshift({ date: dateKey, pct, items: snapshot });
  save(type + '-records', records);
}

// ── 컨텍스트 메뉴 ──────────────────────────────────────
function toggleCtx(btn) {
  document.querySelectorAll('.ctx-menu.open').forEach(m => {
    if (m !== btn.querySelector('.ctx-menu')) m.classList.remove('open');
  });
  btn.querySelector('.ctx-menu').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.more-btn')) {
    document.querySelectorAll('.ctx-menu.open').forEach(m => m.classList.remove('open'));
  }
});

// ── 삭제 ──────────────────────────────────────────────
function deleteItem(ctxItem) {
  const todoItem = ctxItem.closest('.todo-item');
  const id = todoItem.dataset.id;
  const type = todoItem.dataset.type;
  const items = load(type + '-items');
  save(type + '-items', items.filter(i => i.id !== id));
  renderList(type);
  ctxItem.closest('.ctx-menu').classList.remove('open');
}

// ── 시트 열기/닫기 ────────────────────────────────────
let dailySelectedChips = [];
let monthlySelectedChip = null;
let editingId = null;
let editingType = null;

function openSheet(type) {
  document.getElementById('sheet-' + type).classList.add('open');
}
function closeSheet(type) {
  document.getElementById('sheet-' + type).classList.remove('open');
  if (type === 'daily') {
    document.getElementById('daily-input').value = '';
    dailySelectedChips = [];
    document.querySelectorAll('#daily-chips .chip').forEach(c => c.classList.remove('selected'));
    document.getElementById('daily-save').disabled = true;
  }
  if (type === 'monthly') {
    document.getElementById('monthly-input').value = '';
    monthlySelectedChip = null;
    document.querySelectorAll('#monthly-chips .chip').forEach(c => c.classList.remove('selected'));
    document.getElementById('monthly-save').disabled = true;
  }
}

document.querySelectorAll('.sheet-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeSheet(overlay.id.replace('sheet-', ''));
  });
});

// ── 루틴 칩 ──────────────────────────────────────────
function selectDailyChip(chip, val) {
  const chips = document.querySelectorAll('#daily-chips .chip');
  const exclusive = ['없음', '매일'];
  if (exclusive.includes(val)) {
    chips.forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
    dailySelectedChips = [val];
  } else {
    chips[0].classList.remove('selected');
    chips[1].classList.remove('selected');
    chip.classList.toggle('selected');
    dailySelectedChips = [...chips].filter((c,i) => i > 1 && c.classList.contains('selected')).map(c => c.textContent);
  }
  checkSave('daily');
}
function selectMonthlyChip(chip) {
  document.querySelectorAll('#monthly-chips .chip').forEach(c => c.classList.remove('selected'));
  chip.classList.add('selected');
  monthlySelectedChip = chip.textContent;
  checkSave('monthly');
}

// ── 저장 버튼 활성화 ──────────────────────────────────
function checkSave(type) {
  if (type === 'daily') {
    const hasText = document.getElementById('daily-input').value.trim().length > 0;
    const hasChip = dailySelectedChips.length > 0;
    document.getElementById('daily-save').disabled = !(hasText && hasChip);
    document.getElementById('daily-clear').classList.toggle('show', document.getElementById('daily-input').value.length > 0);
  } else {
    const hasText = document.getElementById('monthly-input').value.trim().length > 0;
    const hasChip = monthlySelectedChip !== null;
    document.getElementById('monthly-save').disabled = !(hasText && hasChip);
    document.getElementById('monthly-clear').classList.toggle('show', document.getElementById('monthly-input').value.length > 0);
  }
}
function clearInput(type) {
  document.getElementById(type + '-input').value = '';
  checkSave(type);
}

// ── 저장 ──────────────────────────────────────────────
function saveItem(type) {
  const text = document.getElementById(type + '-input').value.trim();
  const routine = type === 'daily'
    ? (dailySelectedChips.length === 1 ? dailySelectedChips[0] : dailySelectedChips)
    : monthlySelectedChip;
  const items = load(type + '-items');
  items.push({
    id: Date.now().toString(),
    text,
    routine,
    createdDate: todayKey
  });
  save(type + '-items', items);
  closeSheet(type);
  renderList(type);
}

// ── 수정 시트 ──────────────────────────────────────────
function openEditSheet(ctxItem) {
  const todoItem = ctxItem.closest('.todo-item');
  editingId = todoItem.dataset.id;
  editingType = todoItem.dataset.type;
  ctxItem.closest('.ctx-menu').classList.remove('open');

  const items = load(editingType + '-items');
  const item = items.find(i => i.id === editingId);
  if (!item) return;

  document.getElementById('edit-title').textContent = editingType === 'daily' ? '일간 목표 수정하기' : '월간 목표 수정하기';
  document.getElementById('edit-input').value = item.text;

  const chipsEl = document.getElementById('edit-chips');
  if (editingType === 'daily') {
    chipsEl.innerHTML = ['없음','매일','월','화','수','목','금','토','일'].map(v =>
      `<button class="chip ${v.length===1?'chip-sm':''} ${isChipSelected(item.routine, v) ? 'selected' : ''}" onclick="selectEditChip(this,'${v}','daily')">${v}</button>`
    ).join('');
  } else {
    chipsEl.innerHTML = ['없음','매월','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'].map(v =>
      `<button class="chip ${item.routine === v ? 'selected' : ''}" onclick="selectEditChip(this,'${v}','monthly')">${v}</button>`
    ).join('');
  }
  document.getElementById('sheet-edit').classList.add('open');
}

function isChipSelected(routine, val) {
  if (Array.isArray(routine)) return routine.includes(val);
  return routine === val;
}

function selectEditChip(chip, val, type) {
  const row = chip.closest('.chip-row');
  const chips = row.querySelectorAll('.chip');
  if (type === 'daily') {
    const exclusive = ['없음','매일'];
    if (exclusive.includes(val)) {
      chips.forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
    } else {
      chips[0].classList.remove('selected');
      chips[1].classList.remove('selected');
      chip.classList.toggle('selected');
    }
  } else {
    chips.forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
  }
}

function saveEdit() {
  const text = document.getElementById('edit-input').value.trim();
  if (!text) return;
  const chips = document.querySelectorAll('#edit-chips .chip.selected');
  let routine;
  if (editingType === 'daily') {
    const vals = [...chips].map(c => c.textContent);
    routine = vals.length === 1 ? vals[0] : vals;
  } else {
    routine = chips[0]?.textContent || '없음';
  }
  const items = load(editingType + '-items');
  const idx = items.findIndex(i => i.id === editingId);
  if (idx !== -1) { items[idx].text = text; items[idx].routine = routine; }
  save(editingType + '-items', items);
  closeSheet('edit');
  renderList(editingType);
}

// ── FAB ──────────────────────────────────────────────
document.getElementById('fab-btn').addEventListener('click', () => {
  openSheet(currentTab);
});

// ── 초기화 ──────────────────────────────────────────
document.getElementById('daily-date').textContent = formatDateKo(today);
document.getElementById('monthly-date').textContent = formatMonthKo(today);
renderList('daily');
renderList('monthly');
</script>
