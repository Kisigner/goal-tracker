<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
.settings-group { margin-bottom: 24px; }
.settings-label {
  font-size: 12px; font-weight: 600;
  color: var(--text-3); margin-bottom: 8px;
  padding: 0 4px; text-transform: uppercase; letter-spacing: 0.04em;
}
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 16px; margin-bottom: 8px;
  cursor: pointer; transition: background 0.15s;
}
.settings-row:last-child { margin-bottom: 0; }
.settings-row:active { background: var(--bg3); }
.settings-row-label { font-size: 15px; color: var(--text-1); }
.settings-row-value { font-size: 14px; color: var(--text-3); display: flex; align-items: center; gap: 6px; }
/* Toggle switch */
.toggle {
  width: 48px; height: 28px; border-radius: 14px;
  background: var(--bg4); position: relative;
  cursor: pointer; transition: background 0.2s;
  flex-shrink: 0;
}
.toggle.on { background: var(--orange); }
.toggle::after {
  content: ''; width: 22px; height: 22px; border-radius: 50%;
  background: white; position: absolute;
  top: 3px; left: 3px;
  transition: transform 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.toggle.on::after { transform: translateX(20px); }
.coming-soon {
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 8px;
  padding: 48px 20px;
  color: var(--text-3); font-size: 14px; text-align: center;
}
</style>
</head>
<body>
  <div class="content">
    <div class="page-header" style="margin-bottom:28px;">
      <div class="page-title">설정</div>
    </div>

    <div class="settings-group">
      <div class="settings-label">알림</div>
      <div class="settings-row">
        <span class="settings-row-label">푸시 알림</span>
        <div class="toggle on" onclick="this.classList.toggle('on')"></div>
      </div>
      <div class="settings-row">
        <span class="settings-row-label">알림 시간</span>
        <span class="settings-row-value">
          오전 9:00
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#636366" stroke-width="2" stroke-linecap="round"/></svg>
        </span>
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-label">일반</div>
      <div class="settings-row">
        <span class="settings-row-label">하루 시작 시간</span>
        <span class="settings-row-value">
          오전 6:00
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#636366" stroke-width="2" stroke-linecap="round"/></svg>
        </span>
      </div>
      <div class="settings-row">
        <span class="settings-row-label">테마</span>
        <span class="settings-row-value">
          다크 모드
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#636366" stroke-width="2" stroke-linecap="round"/></svg>
        </span>
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-label">앱 정보</div>
      <div class="settings-row">
        <span class="settings-row-label">버전</span>
        <span class="settings-row-value">1.0.0</span>
      </div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <a class="tab-item" href="index.html">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 10h16M4 14h10" stroke="#636366" stroke-width="2" stroke-linecap="round"/></svg>
      <span class="tab-label">목표</span>
    </a>
    <a class="tab-item" href="records.html">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#636366" stroke-width="2"/><polyline points="12 7 12 12 15 15" stroke="#636366" stroke-width="2" stroke-linecap="round"/></svg>
      <span class="tab-label">기록</span>
    </a>
    <a class="tab-item" href="routine.html">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none"><path d="M4 20V14M9 20V10M14 20V14M19 20V4" stroke="#636366" stroke-width="2" stroke-linecap="round"/></svg>
      <span class="tab-label">루틴</span>
    </a>
    <a class="tab-item" href="settings.html">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="#FF8C00" stroke-width="2"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="#FF8C00" stroke-width="2" stroke-linecap="round"/></svg>
      <span class="tab-label active">설정</span>
    </a>
  </div>
</div>
</body>
</html>
